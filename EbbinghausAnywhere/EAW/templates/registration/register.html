<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册</title>
    <!-- 引入 Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1e1e1e; /* 深色背景 */
            color: #ffffff; /* 白色字体 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            width: 100%;
            max-width: 400px; /* 卡片最大宽度 */
            background-color: #2c2c2c; /* 卡片深色背景 */
            border: none;
            border-radius: 10px;
        }
        .form-control {
            background-color: #3c3c3c;
            color: #ffffff;
            border: 1px solid #555555;
        }
        .form-control::placeholder {
            color: #aaaaaa; /* 浅色占位符 */
        }
        .btn-primary {
            background-color: #333333;
            border-color: #ffffff;
        }
        .btn-primary:hover {
            background-color: #444444;
            border-color: #dddddd;
        }
        a {
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="card p-4">
        <h2 class="text-center mb-4">注册</h2>
        <form method="post">
            {% csrf_token %}
            <!-- 用户名 -->
            <div class="mb-3 position-relative">
                <input type="text" name="username" class="form-control" placeholder="Username" id="username" required>
                <span class="position-absolute top-50 end-0 translate-middle-y me-3" data-bs-toggle="tooltip" title="用户名要求：最多150字符，仅允许字母、数字和@/./+/-/_。">
                    <i class="bi bi-info-circle text-white"></i>
                </span>
            </div>
            <!-- 邮箱 -->
            <div class="mb-3 position-relative">
                <input type="email" name="email" class="form-control" placeholder="Email" id="email" required>
                <span class="position-absolute top-50 end-0 translate-middle-y me-3" data-bs-toggle="tooltip" title="请输入有效的电子邮件地址。">
                    <i class="bi bi-info-circle text-white"></i>
                </span>
            </div>
            <!-- 密码 -->
            <div class="mb-3 position-relative">
                <input type="password" name="password1" class="form-control" placeholder="Password" id="password" required>
                <span class="position-absolute top-50 end-0 translate-middle-y me-3" data-bs-toggle="tooltip" title="密码必须包含至少8个字符，不能与个人信息过于相似，且不能是常用密码。">
                    <i class="bi bi-info-circle text-white"></i>
                </span>
            </div>
            <!-- 确认密码 -->
            <div class="mb-3">
                <input type="password" name="password2" class="form-control" placeholder="Confirm Password" required>
            </div>
            <!-- 服务条款 -->
            <div class="form-check mb-3">
                <input type="checkbox" class="form-check-input" id="terms" required>
                <label class="form-check-label" for="terms">
                    我同意本网站的隐私政策和服务条款
                </label>
            </div>
            <button type="submit" class="btn btn-primary w-100">注册</button>
        </form>
        <p class="text-center mt-3">
            已经有账户了？<a href="{% url 'login' %}">登录</a>
        </p>
    </div>

    <!-- 引入 Bootstrap JS 和图标 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <script>
        // 初始化 Tooltip
        document.addEventListener('DOMContentLoaded', function () {
            var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
            var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
                return new bootstrap.Tooltip(tooltipTriggerEl)
            })
        });
    </script>
</body>
</html>
